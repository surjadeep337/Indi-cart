<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Checkout - INDICART</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: #f1f3f6;
        }

        .navbar {
            position: relative;
            padding: 18px 60px;
            background: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #ff6a2f, transparent, #ff6a2f);
            background-size: 200%;
            animation: lineMove 6s linear infinite;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
        }

        .logo span {
            color: #ff6a2f;
        }

        .nav-links a {
            text-decoration: none;
            color: #333;
        }

        .nav-links a:hover {
            color: #ff6a2f;
        }

        .main {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            gap: 30px;
        }

        .glow-box {
            padding: 3px;
            border-radius: 16px;
            background: linear-gradient(90deg, #ff6a2f, transparent, #ff6a2f);
            background-size: 200%;
            animation: lineMove 6s linear infinite;
            transition: 0.3s;
        }

        .glow-box:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 14px;
        }

        .form-box {
            flex: 2;
        }

        input,
        select {
            width: 100%;
            padding: 14px;
            margin-bottom: 14px;
            border-radius: 10px;
            border: 1px solid #ddd;
            transition: 0.2s;
        }

        input:focus,
        select:focus {
            border-color: #ff6a2f;
            box-shadow: 0 0 8px rgba(255, 106, 47, 0.3);
        }

        h3 {
            margin-bottom: 12px;
        }

        .summary-box {
            flex: 1;
        }

        .summary-box p {
            margin: 8px 0;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #ff6a2f, #ff8c42);
            color: white;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(255, 106, 47, 0.4);
        }

        .footer {
            position: relative;
            padding: 18px;
            text-align: center;
            background: white;
        }

        .footer::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #ff6a2f, transparent, #ff6a2f);
            background-size: 200%;
            animation: lineMove 6s linear infinite;
        }

        @keyframes lineMove {
            0% {
                background-position: 0%;
            }

            100% {
                background-position: 200%;
            }
        }
    </style>
</head>

<body>

    <div class="navbar">
        <div class="logo">INDI<span>CART</span></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
        </div>
    </div>

    <div class="main">
        <div class="container">

            <div class="form-box">
                <div class="glow-box">
                    <div class="box">

                        <h3>Delivery Address</h3>

                        <input id="name" placeholder="Full Name">
                        <input id="phone" placeholder="Phone Number">
                        <input id="address" placeholder="Address">
                        <input placeholder="City">
                        <input placeholder="Pincode">

                        <h3>Payment Method</h3>

                        <select>
                            <option>Cash on Delivery</option>
                            <option>UPI</option>
                            <option>Card</option>
                        </select>

                    </div>
                </div>
            </div>

            <div class="summary-box">
                <div class="glow-box">
                    <div class="box">

                        <h3>Order Summary</h3>

                        <p>Total Items: <span id="items">0</span></p>
                        <p>Total Price: ₹<span id="total">0</span></p>

                        <button onclick="placeOrder()">Confirm Order</button>

                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="footer">
        © 2026 INDICART. Made with ❤️ in India. All Rights Reserved.
    </div>

    <script>

        let cart = JSON.parse(localStorage.getItem('indicart_cart')) || [];

        function loadSummary() {
            let items = 0, total = 0;

            cart.forEach(i => {
                items += i.qty;
                total += i.price * i.qty;
            });

            document.getElementById("items").innerText = items;
            document.getElementById("total").innerText = total;
        }

        function placeOrder() {

            let name = document.getElementById("name").value;
            let phone = document.getElementById("phone").value;
            let address = document.getElementById("address").value;

            if (name == "" || phone == "" || address == "") {
                alert("Fill all details");
                return;
            }

            alert("Order placed successfully 🎉");

            localStorage.removeItem("indicart_cart");

            window.location.href = "index.html";
        }

        loadSummary();

    </script>

</body>

</html>
