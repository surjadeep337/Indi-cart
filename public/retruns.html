<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Returns - INDICART</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        body {
            background: #f1f3f6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .navbar {
            position: relative;
            padding: 18px 60px;
            background: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #ff6a2f, transparent, #ff6a2f);
            background-size: 200%;
            animation: lineMove 6s linear infinite;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
        }

        .logo span {
            color: #ff6a2f;
        }

        .nav-links a {
            text-decoration: none;
            color: #333;
        }

        .nav-links a:hover {
            color: #ff6a2f;
        }

        .main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .glow-box {
            padding: 3px;
            border-radius: 16px;
            position: relative;
            width: 100%;
            max-width: 900px;

            background: linear-gradient(90deg, #ff6a2f, #ff9a5a, #ff6a2f);
            background-size: 300%;
            animation: lineMove 4s linear infinite;
            overflow: hidden;
        }

        .glow-box::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 106, 47, 0.6), transparent);
            animation: shine 3s linear infinite;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 14px;
            position: relative;
            z-index: 1;
        }

        .info {
            background: #fff7f3;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #ff6a2f;
            font-size: 14px;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid #ddd;
            transition: 0.2s;
        }

        input:focus,
        textarea:focus,
        select:focus {
            border-color: #ff6a2f;
            box-shadow: 0 0 8px rgba(255, 106, 47, 0.3);
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #ff6a2f, #ff8c42);
            color: white;
            cursor: pointer;
            transition: 0.3s;
            font-size: 16px;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(255, 106, 47, 0.4);
        }

        .footer {
            position: relative;
            padding: 18px;
            text-align: center;
            background: white;
        }

        .footer::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #ff6a2f, transparent, #ff6a2f);
            background-size: 200%;
            animation: lineMove 6s linear infinite;
        }

        @keyframes lineMove {
            0% {
                background-position: 0%;
            }

            100% {
                background-position: 300%;
            }
        }

        @keyframes shine {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }
    </style>
    
</head>

<body>

    <div class="navbar">
        <div class="logo">INDI<span>CART</span></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
        </div>
    </div>

    <div class="main">
        <div class="glow-box">
            <div class="box">

                <h2>Return / Replace Product</h2>

                <div class="info">
                    You can request a return within 7 days of delivery. Refund will be processed after product
                    verification.
                </div>

                <input id="orderId" placeholder="Order ID">
                <input placeholder="Product Name">

                <select id="reason">
                    <option>Select Reason</option>
                    <option>Damaged Product</option>
                    <option>Wrong Item Received</option>
                    <option>Quality Issues</option>
                    <option>Other</option>
                </select>

                <textarea rows="4" placeholder="Describe the issue (optional)"></textarea>

                <button onclick="submitReturn()">Submit Request</button>

            </div>
        </div>
    </div>


    <div class="footer">
        © 2026 INDICART. Made with ❤️ in India.
    </div>

    <script>
        function submitReturn() {
            let orderId = document.getElementById("orderId").value;
            let reason = document.getElementById("reason").value;

            if (orderId === "" || reason === "Select Reason") {
                alert("Please fill required fields");
                return;
            }

            alert("Return request submitted successfully ✅");
        }
    </script>

</body>

</html>
