<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout - INDICART</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
    body{min-height:100vh;display:flex;flex-direction:column;background:#f1f3f6}
    .navbar{position:relative;padding:18px 60px;background:white;display:flex;justify-content:space-between;align-items:center}
    .navbar::after{content:"";position:absolute;bottom:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,#ff6a2f,transparent,#ff6a2f);background-size:200%;animation:move 6s linear infinite}
    .logo{font-size:28px;font-weight:bold}.logo span{color:#ff6a2f}
    .nav-links a{text-decoration:none;color:#333}.nav-links a:hover{color:#ff6a2f}
    .main{flex:1;display:flex;justify-content:center;padding:40px}
    .wrap{width:100%;max-width:1200px;display:flex;gap:30px}
    .glow-box{padding:3px;border-radius:16px;background:linear-gradient(90deg,#ff6a2f,transparent,#ff6a2f);background-size:200%;animation:move 6s linear infinite;transition:0.3s}
    .glow-box:hover{transform:translateY(-8px)}
    .box{background:white;padding:30px;border-radius:14px}
    .form-box{flex:2}.summary-box{flex:1}
    input,select{width:100%;padding:14px;margin-bottom:14px;border-radius:10px;border:1px solid #ddd;outline:none;transition:0.2s}
    input:focus,select:focus{border-color:#ff6a2f;box-shadow:0 0 8px rgba(255,106,47,.3)}
    h3{margin-bottom:12px}
    .item-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
    .item-row span:last-child{color:#ff6a2f;font-weight:bold}
    .total-line{display:flex;justify-content:space-between;font-weight:bold;font-size:16px;margin-top:10px}
    .btn{width:100%;padding:14px;border:none;border-radius:30px;background:linear-gradient(135deg,#ff6a2f,#ff8c42);color:white;cursor:pointer;margin-top:15px;transition:0.3s;font-size:15px;font-weight:bold}
    .btn:hover{transform:scale(1.05)}.btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
    .btn-white{background:white!important;color:#ff6a2f!important;border:2px solid #ff6a2f!important}
    .order-box{background:#fff7f3;border:2px dashed #ff6a2f;border-radius:12px;padding:15px;margin:15px 0;text-align:center}
    .order-box p{font-size:13px;color:#888;margin-bottom:4px}
    .order-box h2{color:#ff6a2f;font-size:28px}
    .warn{background:#fff3cd;border-left:4px solid #ff6a2f;padding:12px;border-radius:8px;margin-bottom:12px}
    .warn a{color:#ff6a2f;font-weight:bold}
    .footer{position:relative;padding:18px;text-align:center;background:white}
    .footer::before{content:"";position:absolute;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,#ff6a2f,transparent,#ff6a2f);background-size:200%;animation:move 6s linear infinite}
    @keyframes move{0%{background-position:0%}100%{background-position:200%}}
  </style>
</head>
<body>

<div class="navbar">
  <div class="logo">INDI<span>CART</span></div>
  <div class="nav-links"><a href="index.html">Home</a></div>
</div>

<div class="main">
  <div class="wrap" id="mainWrap">

    <!-- LEFT: Delivery form -->
    <div class="form-box">
      <div class="glow-box">
        <div class="box">
          <h3>Delivery Address</h3>
          <input id="name"    placeholder="Full Name">
          <input id="phone"   placeholder="Phone Number" type="tel">
          <input id="address" placeholder="Full Address">
          <input id="city"    placeholder="City">
          <input id="pincode" placeholder="Pincode">
          <h3>Payment Method</h3>
          <select id="payment">
            <option>Cash on Delivery</option>
            <option>UPI</option>
            <option>Card</option>
          </select>
        </div>
      </div>
    </div>

    <!-- RIGHT: Order summary -->
    <div class="summary-box">
      <div class="glow-box">
        <div class="box" id="summaryBox">
          <h3>Order Summary</h3>
          <div id="itemsList"><p style="color:#999;padding:10px 0">Loading...</p></div>
          <hr style="margin:12px 0">
          <p style="margin:6px 0">Items: <strong id="itemCount">0</strong></p>
          <p style="margin:6px 0;color:green" id="discountLine"></p>
          <p style="margin:6px 0">Delivery: ₹<span id="deliveryCharge">0</span></p>
          <div class="total-line">
            <span>Total:</span>
            <span style="color:#ff6a2f">₹<span id="total">0</span></span>
          </div>
          <button class="btn" id="placeBtn" onclick="placeOrder()">✅ Confirm Order</button>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="footer">© 2026 INDICART. Made with ❤️ in India. All Rights Reserved.</div>

<script src="api.js"></script>
<script>
  let cart = [];
  let loggedIn = false;

  async function init() {
    // Check login
    const meRes = await Auth.me();
    if (!meRes.ok || !meRes.data.loggedIn) {
      document.getElementById('summaryBox').innerHTML = `
        <div class="warn">⚠️ Please <a href="account.html">login</a> before checkout.</div>`;
      document.getElementById('placeBtn') && (document.getElementById('placeBtn').disabled = true);
      return;
    }
    loggedIn = true;
    // Pre-fill name
    document.getElementById('name').value = meRes.data.user.name;

    // Load cart from backend
    const cartRes = await Cart.get();
    if (cartRes.ok) {
      cart = cartRes.data;
      renderSummary();
    }
  }

  function renderSummary() {
    if (!cart.length) {
      document.getElementById('itemsList').innerHTML =
        '<p style="color:#999;text-align:center;padding:15px">Cart is empty! <a href="index.html" style="color:#ff6a2f">Go shop</a></p>';
      document.getElementById('placeBtn').disabled = true;
      return;
    }
    document.getElementById('itemsList').innerHTML = cart.map(i => `
      <div class="item-row">
        <span>${i.emoji || ''} ${i.name} ×${i.qty}</span>
        <span>₹${(i.price * i.qty).toLocaleString('en-IN')}</span>
      </div>`).join('');

    const sub  = cart.reduce((s,i) => s + i.price * i.qty, 0);
    const disc = Math.floor(sub * 0.1);
    const del  = sub > 499 ? 0 : 50;
    const tot  = sub - disc + del;

    document.getElementById('itemCount').textContent     = cart.reduce((s,i) => s + i.qty, 0);
    document.getElementById('discountLine').textContent  = `Discount (10%): -₹${disc.toLocaleString('en-IN')}`;
    document.getElementById('deliveryCharge').textContent= del === 0 ? '0 (Free!)' : del;
    document.getElementById('total').textContent         = tot.toLocaleString('en-IN');
  }

  async function placeOrder() {
    const name    = document.getElementById('name').value.trim();
    const phone   = document.getElementById('phone').value.trim();
    const address = document.getElementById('address').value.trim();
    const city    = document.getElementById('city').value.trim();
    const pincode = document.getElementById('pincode').value.trim();
    const payment = document.getElementById('payment').value;

    if (!name || !phone || !address) { alert('Fill Name, Phone and Address'); return; }
    if (!cart.length) { alert('Cart is empty!'); return; }

    const btn = document.getElementById('placeBtn');
    btn.disabled = true;
    btn.textContent = 'Placing order...';

    const res = await Orders.place({ name, phone, address, city, pincode, payment });

    if (res.ok) {
      showSuccess(res.data.orderId);
    } else {
      alert(res.data.error || 'Failed to place order. Try again.');
      btn.disabled = false;
      btn.textContent = '✅ Confirm Order';
    }
  }

  function showSuccess(orderId) {
    document.getElementById('mainWrap').innerHTML = `
      <div style="width:100%;display:flex;justify-content:center">
        <div class="glow-box" style="max-width:520px;width:100%">
          <div class="box" style="text-align:center;padding:40px 30px">
            <div style="font-size:64px;margin-bottom:15px">🎉</div>
            <h2 style="margin-bottom:8px">Order Placed Successfully!</h2>
            <p style="color:#666;margin-bottom:15px">Thank you for shopping with INDICART!</p>
            <div class="order-box">
              <p>Your Order ID (save this!)</p>
              <h2>#${orderId}</h2>
            </div>
            <a href="track.html"><button class="btn">📦 Track My Order</button></a>
            <a href="index.html"><button class="btn btn-white" style="margin-top:10px">🛍 Continue Shopping</button></a>
          </div>
        </div>
      </div>`;
  }

  init();
</script>
</body>
</html>
