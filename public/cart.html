<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Cart - INDICART</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
    body{min-height:100vh;display:flex;flex-direction:column;background:#f1f3f6}
    .navbar{position:relative;padding:18px 60px;background:white;display:flex;justify-content:space-between;align-items:center}
    .navbar::after{content:"";position:absolute;bottom:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,#ff6a2f,transparent,#ff6a2f);background-size:200%;animation:move 6s linear infinite}
    .logo{font-size:28px;font-weight:bold}.logo span{color:#ff6a2f}
    .nav-links a{margin-left:25px;text-decoration:none;color:#333}.nav-links a:hover{color:#ff6a2f}
    .main{flex:1;display:flex;justify-content:center;align-items:flex-start;padding:40px}
    .wrap{width:100%;max-width:1200px;display:flex;gap:25px}
    .glow-box{padding:3px;border-radius:14px;background:linear-gradient(90deg,#ff6a2f,transparent,#ff6a2f);background-size:200%;animation:move 6s linear infinite;transition:0.3s}
    .glow-box:hover{transform:translateY(-6px)}
    .cart-box{flex:2}.price-box{flex:1}
    .cart-inner,.price-inner{background:white;padding:25px;border-radius:12px}
    .cart-item{display:flex;justify-content:space-between;align-items:center;padding:15px 0;border-bottom:1px solid #eee}
    .cart-left{display:flex;gap:15px}
    .item-emoji{font-size:30px}
    .qty{display:flex;align-items:center;gap:8px;margin-top:6px}
    .qty button{padding:4px 10px;border:none;background:#ff6a2f;color:white;cursor:pointer;border-radius:5px;font-size:14px}
    .remove{color:red;font-size:13px;cursor:pointer;margin-top:5px;display:inline-block}
    .price-inner h3{margin-bottom:15px}.price-inner p{margin:6px 0}
    .main-btn{width:100%;padding:12px;border:none;border-radius:25px;background:linear-gradient(135deg,#ff6a2f,#ff8c42);color:white;margin-top:15px;cursor:pointer;transition:0.3s;font-size:15px;font-weight:bold}
    .main-btn:hover{transform:scale(1.05)}.main-btn:disabled{background:#ccc;cursor:not-allowed;transform:none}
    .footer{position:relative;padding:18px;text-align:center;background:white}
    .footer::before{content:"";position:absolute;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,#ff6a2f,transparent,#ff6a2f);background-size:200%;animation:move 6s linear infinite}
    @keyframes move{0%{background-position:0%}100%{background-position:200%}}
    .empty{text-align:center;padding:40px;color:#555;line-height:2}
    .empty a{color:#ff6a2f;text-decoration:none;font-weight:bold}
    .warn{background:#fff3cd;border-left:4px solid #ff6a2f;padding:15px 20px;border-radius:8px}
    .warn a{color:#ff6a2f;font-weight:bold}
  </style>
</head>
<body>

<div class="navbar">
  <div class="logo">INDI<span>CART</span></div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="account.html">Account</a>
  </div>
</div>

<div class="main">
  <div class="wrap">

    <div class="cart-box">
      <div class="glow-box">
        <div class="cart-inner" id="cartList">
          <div class="empty">Loading your cart... ⏳</div>
        </div>
      </div>
    </div>

    <div class="price-box">
      <div class="glow-box">
        <div class="price-inner">
          <h3>Price Details</h3>
          <p>Subtotal: ₹<span id="subtotal">0</span></p>
          <p>Discount (10%): ₹<span id="discount">0</span></p>
          <p>Delivery: ₹<span id="delivery">0</span></p>
          <hr style="margin:12px 0">
          <h3>Total: ₹<span id="total">0</span></h3>
          <button class="main-btn" id="checkoutBtn" onclick="goCheckout()">
            Proceed to Checkout →
          </button>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="footer">
  <p>© 2026 <span>INDICART</span>. Made with ❤️ in India. All Rights Reserved.</p>
</div>

<script src="api.js"></script>
<script>
  let cart = [];

  async function loadCart() {
    const meRes = await Auth.me();
    if (!meRes.ok || !meRes.data.loggedIn) {
      document.getElementById('cartList').innerHTML =
        `<div class="warn">⚠️ Please <a href="account.html">login</a> to view your cart.</div>`;
      document.getElementById('checkoutBtn').disabled = true;
      return;
    }
    const res = await Cart.get();
    if (res.ok) { cart = res.data; renderCart(); }
    else document.getElementById('cartList').innerHTML =
      "<div class='empty'>Could not load cart. Please refresh.</div>";
  }

  function renderCart() {
    const el = document.getElementById('cartList');
    if (!cart.length) {
      el.innerHTML = `<div class="empty">Your cart is empty 🛒<br>
        <a href="index.html">← Continue Shopping</a></div>`;
      setTotals(0); return;
    }
    el.innerHTML = cart.map(item => `
      <div class="cart-item">
        <div class="cart-left">
          <div class="item-emoji">${item.emoji || '📦'}</div>
          <div>
            <strong>${item.name}</strong>
            <p style="color:#ff6a2f;margin-top:4px">₹${item.price.toLocaleString('en-IN')}</p>
            <div class="qty">
              <button onclick="changeQty(${item.product_id},-1)">−</button>
              <span>${item.qty}</span>
              <button onclick="changeQty(${item.product_id},1)">+</button>
            </div>
            <span class="remove" onclick="removeItem(${item.product_id})">🗑 Remove</span>
          </div>
        </div>
        <strong>₹${(item.price * item.qty).toLocaleString('en-IN')}</strong>
      </div>`).join('');
    setTotals(cart.reduce((s,i) => s + i.price * i.qty, 0));
  }

  function setTotals(sub) {
    const disc = Math.floor(sub * 0.1);
    const del  = sub > 500 ? 0 : 50;
    document.getElementById('subtotal').textContent = sub.toLocaleString('en-IN');
    document.getElementById('discount').textContent = disc.toLocaleString('en-IN');
    document.getElementById('delivery').textContent = del;
    document.getElementById('total').textContent    = (sub - disc + del).toLocaleString('en-IN');
  }

  async function changeQty(pid, delta) {
    const item = cart.find(i => i.product_id === pid);
    if (!item) return;
    const res = await Cart.updateQty(pid, item.qty + delta);
    if (res.ok) { cart = res.data.cart; renderCart(); }
  }

  async function removeItem(pid) {
    const res = await Cart.remove(pid);
    if (res.ok) { cart = res.data.cart; renderCart(); }
  }

  function goCheckout() {
    if (!cart.length) { alert('Cart is empty!'); return; }
    window.location.href = 'checkout.html';
  }

  loadCart();
</script>
</body>
</html>
