<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Support - INDICART</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: #f1f3f6;
        }

        .navbar {
            position: relative;
            padding: 15px 60px;
            background: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ff6a2f, transparent);
            background-size: 200% 100%;
            animation: lineMove 15s ease-in-out infinite;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
        }

        .logo span {
            color: #ff6a2f;
        }

        .nav-links a {
            margin-left: 25px;
            text-decoration: none;
            color: #333;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #ff6a2f;
        }

        .main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .glow-box {
            position: relative;
            border-radius: 12px;
            padding: 2px;
            background: linear-gradient(90deg, transparent, #ff6a2f, transparent);
            background-size: 200% 100%;
            animation: lineMove 10s ease-in-out infinite;
            width: 100%;
            max-width: 600px;
        }

        .container {
            background: white;
            padding: 35px;
            border-radius: 10px;
            width: 100%;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
        }

        .container h1 {
            margin-bottom: 20px;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
            outline: none;
            transition: 0.2s;
        }

        input:focus,
        textarea:focus {
            border-color: #ff6a2f;
            box-shadow: 0 0 5px rgba(255, 106, 47, 0.3);
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #ff6a2f, #ff8c42);
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(255, 106, 47, 0.4);
        }

        .footer {
            position: relative;
            padding: 20px;
            text-align: center;
            background: white;
        }

        .footer::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ff6a2f, transparent);
            background-size: 200% 100%;
            animation: lineMove 15s ease-in-out infinite;
        }

        .footer span {
            color: #ff6a2f;
            font-weight: bold;
        }

        @keyframes lineMove {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }
    </style>
</head>

<body>

    <div class="navbar">
        <div class="logo">INDI<span>CART</span></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="customer_support.html" class="active">Support</a>
        </div>
    </div>

    <div class="main">

        <div class="glow-box">
            <div class="container">
                <h1>Customer Support</h1>

                <input type="text" placeholder="Your Name">
                <input type="email" placeholder="Your Email">
                <textarea rows="5" placeholder="Describe your issue"></textarea>

                <button onclick="window.location.href='home.html'">Submit</button>
            </div>
        </div>

    </div>

    <div class="footer">
        © 2026 INDI<span>CART</span>. Made with ❤️ in India.
    </div>

</body>

</html>
