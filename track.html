<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Track Order - INDICART</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial;
}

body{
  background:#f1f3f6;
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

/* NAVBAR */
.navbar{
  position:relative;
  padding:18px 60px;
  background:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.navbar::after{
  content:"";
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  height:3px;
  background:linear-gradient(90deg,#ff6a2f,transparent,#ff6a2f);
  background-size:200%;
  animation:lineMove 6s linear infinite;
}

.logo{
  font-size:28px;
  font-weight:bold;
}

.logo span{
  color:#ff6a2f;
}

.nav-links a{
  text-decoration:none;
  color:#333;
}

.nav-links a:hover{
  color:#ff6a2f;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:40px;
}

/* GLOW BOX (SAME AS YOUR CHECKOUT) */
.glow-box{
  padding:3px;
  border-radius:16px;
  background:linear-gradient(90deg,#ff6a2f,transparent,#ff6a2f);
  background-size:200%;
  animation:lineMove 6s linear infinite;
  width:100%;
  max-width:900px;
}

.box{
  background:white;
  padding:40px;
  border-radius:14px;
}

/* INPUT */
.input-group{
  display:flex;
  gap:15px;
  margin-bottom:40px;
}

input{
  flex:1;
  padding:14px;
  border-radius:10px;
  border:1px solid #ddd;
}

button{
  padding:14px 30px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#ff6a2f,#ff8c42);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 10px 25px rgba(255,106,47,0.4);
}

/* TRACK */
.track{
  position:relative;
  margin-top:30px;
}

.track-line{
  position:absolute;
  top:20px;
  left:0;
  width:100%;
  height:4px;
  background:#ddd;
}

.track-progress{
  position:absolute;
  top:20px;
  left:0;
  height:4px;
  width:0%;
  background:#ff6a2f;
  transition:0.6s;
}

.steps{
  display:flex;
  justify-content:space-between;
}

.step{
  text-align:center;
  width:100%;
}

.circle{
  width:42px;
  height:42px;
  border-radius:50%;
  background:#ddd;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 10px;
  font-weight:bold;
}

.active .circle{
  background:#ff6a2f;
  color:white;
}

.label{
  font-size:14px;
}

/* FOOTER */
.footer{
  position:relative;
  padding:18px;
  text-align:center;
  background:white;
}

.footer::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:3px;
  background:linear-gradient(90deg,#ff6a2f,transparent,#ff6a2f);
  background-size:200%;
  animation:lineMove 6s linear infinite;
}

/* ANIMATION */
@keyframes lineMove{
  0%{background-position:0%;}
  100%{background-position:200%;}
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">INDI<span>CART</span></div>
  <div class="nav-links">
    <a href="index.html">Home</a>
  </div>
</div>

<div class="main">
  <div class="glow-box">
    <div class="box">

      <h2>Track Your Order</h2>

      <div class="input-group">
        <input type="text" id="orderId" placeholder="Enter Order ID (1-4)">
        <button onclick="trackOrder()">Track</button>
      </div>

      <div class="track">
        <div class="track-line"></div>
        <div class="track-progress" id="progress"></div>

        <div class="steps">
          <div class="step" id="step1">
            <div class="circle">1</div>
            <div class="label">Placed</div>
          </div>
          <div class="step" id="step2">
            <div class="circle">2</div>
            <div class="label">Shipped</div>
          </div>
          <div class="step" id="step3">
            <div class="circle">3</div>
            <div class="label">Out for Delivery</div>
          </div>
          <div class="step" id="step4">
            <div class="circle">4</div>
            <div class="label">Delivered</div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="footer">
  © 2026 INDICART. Made with ❤️ in India.
</div>

<script>
function trackOrder(){
  let id = document.getElementById("orderId").value;
  let steps = [step1, step2, step3, step4];
  let progress = document.getElementById("progress");

  steps.forEach(s => s.classList.remove("active"));

  if(id >=1 && id <=4){
    for(let i=0;i<id;i++){
      steps[i].classList.add("active");
    }

    let percent = ((id-1)/3)*100;
    progress.style.width = percent + "%";
  }else{
    alert("Enter ID between 1-4");
  }
}
</script>

</body>
</html>
