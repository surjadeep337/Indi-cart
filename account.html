<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account - INDICART</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: #f1f3f6;
        }

        .navbar {
            position: relative;
            padding: 18px 60px;
            background: white;
        }

        .navbar::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #ff6a2f, transparent, #ff6a2f);
            background-size: 200% 100%;
            animation: moveLine 8s linear infinite;
        }

        .logo {
            font-size: 30px;
            font-weight: bold;
        }

        .logo span {
            color: #ff6a2f;
        }

        .main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .glow-box {
            padding: 3px;
            border-radius: 16px;
            background: linear-gradient(90deg, #ff6a2f, transparent, #ff6a2f);
            background-size: 200% 100%;
            animation: moveLine 8s linear infinite;
            transition: 0.3s;
        }

        .glow-box:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        .container {
            background: white;
            padding: 45px;
            border-radius: 14px;
            width: 420px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
        }


        .title {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 25px;
        }

        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-radius: 10px;
            overflow: hidden;
        }

        .tabs button {
            flex: 1;
            padding: 12px;
            border: none;
            background: #eee;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .tabs .active {
            background: #ff6a2f;
            color: white;
        }

        input {
            width: 100%;
            padding: 13px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        input:focus {
            border-color: #ff6a2f;
            box-shadow: 0 0 6px rgba(255, 106, 47, 0.3);
        }

        .error-msg {
            color: red;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .submit-btn {
            width: 100%;
            padding: 13px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #ff6a2f, #ff8c42);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(255, 106, 47, 0.4);
        }

        .footer {
            position: relative;
            padding: 18px;
            text-align: center;
            background: white;
        }

        .footer::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #ff6a2f, transparent, #ff6a2f);
            background-size: 200% 100%;
            animation: moveLine 8s linear infinite;
        }

        @keyframes moveLine {
            0% {
                background-position: 0% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <div class="logo">INDI<span>CART</span></div>
    </div>

    <div class="main">

        <div class="glow-box">
            <div class="container">

                <div class="title">Your Account</div>

                <div class="tabs">
                    <button id="loginTab" class="active" onclick="showLogin()">Login</button>
                    <button id="registerTab" onclick="showRegister()">Register</button>
                </div>
                <form id="loginForm">
                    <input id="loginEmail" type="email" placeholder="Email">
                    <input id="loginPassword" type="password" placeholder="Password">
                    <div id="loginError" class="error-msg"></div>
                    <button type="button" class="submit-btn" onclick="validateLogin()">Login</button>
                </form>
                <form id="registerForm" class="hidden">
                    <input type="text" placeholder="Full Name">
                    <input type="email" placeholder="Email">
                    <input id="password" type="password" placeholder="Password">
                    <input id="confirmPassword" type="password" placeholder="Confirm Password">
                    <div id="registerError" class="error-msg"></div>
                    <button type="button" class="submit-btn" onclick="validateRegister()">Register</button>
                </form>
            </div>
        </div>
    </div>
    <div class="footer">
        © 2026 INDI<span>CART</span>. Made in India 🇮🇳
    </div>
    <script>
        function showLogin() {
            loginForm.classList.remove("hidden");
            registerForm.classList.add("hidden");
            loginTab.classList.add("active");
            registerTab.classList.remove("active");
        }
        function showRegister() {
            registerForm.classList.remove("hidden");
            loginForm.classList.add("hidden");
            registerTab.classList.add("active");
            loginTab.classList.remove("active");
        }
        function validateLogin() {
            let email = loginEmail.value;
            let pass = loginPassword.value;
            if (email == "" || pass == "") {
                loginError.innerText = "Fill all fields";
                return;
            }
            if (pass.length < 6) {
                loginError.innerText = "Password must be 6+ chars";
                return;
            }
            loginError.innerText = "";
            alert("Login Successful!");
            window.location.href = "index.html";
        }
        /* REGISTER */
        function validateRegister() {
            let pass = password.value;
            let confirm = confirmPassword.value;
            if (pass !== confirm) {
                registerError.innerText = "Passwords do not match";
                return;
            }
            if (pass.length < 6) {
                registerError.innerText = "Password must be 6+ chars";
                return;
            }
            registerError.innerText = "";
            alert("Account Created Successfully!Please Login Now");
            showLogin();
            document.getElementById("registerForm").reset();
        }

    </script>

</body>

</html>
