<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Your Cart - INDICART</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f1f3f6;
    }

    .navbar {
      position: relative;
      padding: 18px 60px;
      background: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .navbar::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, #ff6a2f, transparent, #ff6a2f);
      background-size: 200%;
      animation: moveLine 6s linear infinite;
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
    }

    .logo span {
      color: #ff6a2f;
    }

    .nav-links a {
      margin-left: 25px;
      text-decoration: none;
      color: #333;
    }

    .nav-links a:hover {
      color: #ff6a2f;
    }

    .main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px;
    }

    .container {
      width: 100%;
      max-width: 1200px;
      display: flex;
      gap: 25px;
    }

    .glow-box {
      padding: 3px;
      border-radius: 14px;
      background: linear-gradient(90deg, #ff6a2f, transparent, #ff6a2f);
      background-size: 200%;
      animation: moveLine 6s linear infinite;
      transition: 0.3s;
    }

    .glow-box:hover {
      transform: translateY(-6px);
    }

    .cart-box {
      flex: 2;
    }

    .cart-inner {
      background: white;
      padding: 25px;
      border-radius: 12px;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 0;
      border-bottom: 1px solid #eee;
    }

    .cart-left {
      display: flex;
      gap: 15px;
    }

    .cart-left div:first-child {
      font-size: 30px;
    }

    .qty {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 5px;
    }

    .qty button {
      padding: 4px 10px;
      border: none;
      background: #ff6a2f;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    .remove {
      color: red;
      font-size: 13px;
      cursor: pointer;
      margin-top: 5px;
    }

    .price-box {
      flex: 1;
    }

    .price-inner {
      background: white;
      padding: 25px;
      border-radius: 12px;
    }

    .price-inner h3 {
      margin-bottom: 15px;
    }

    .price-inner p {
      margin: 6px 0;
    }

    button.main-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 25px;
      background: linear-gradient(135deg, #ff6a2f, #ff8c42);
      color: white;
      margin-top: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    button.main-btn:hover {
      transform: scale(1.05);
    }

    .footer {
      position: relative;
      padding: 18px;
      text-align: center;
      background: white;
    }

    .footer::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, #ff6a2f, transparent, #ff6a2f);
      background-size: 200%;
      animation: moveLine 6s linear infinite;
    }

    @keyframes moveLine {
      0% {
        background-position: 0%;
      }

      100% {
        background-position: 200%;
      }
    }

    .empty {
      text-align: center;
      padding: 40px;
      color: #555;
    }
  </style>
</head>

<body>

  <div class="navbar">
    <div class="logo">INDI<span>CART</span></div>
    <div class="nav-links">
      <a href="index.html">Home</a>
    </div>
  </div>

  <div class="main">
    <div class="container">


      <div class="cart-box">
        <div class="glow-box">
          <div class="cart-inner" id="cartList"></div>
        </div>
      </div>

      <div class="price-box">
        <div class="glow-box">
          <div class="price-inner">
            <h3>Price Details</h3>

            <p>Subtotal: ₹<span id="subtotal">0</span></p>
            <p>Discount: ₹<span id="discount">0</span></p>
            <p>Delivery: ₹<span id="delivery">0</span></p>

            <hr><br>

            <h3>Total: ₹<span id="total">0</span></h3>

            <button class="main-btn" onclick="window.location.href='checkout.html'">
              Place Order
            </button>

          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="footer">
    <p>© 2026 <span>INDICART</span>. Made with ❤️ in India. All Rights Reserved.</p>
  </div>

  <script>

    let cart = JSON.parse(localStorage.getItem('indicart_cart')) || [];

    function saveCart() {
      localStorage.setItem('indicart_cart', JSON.stringify(cart));
    }

    function renderCart() {

      let list = document.getElementById("cartList");
      let subtotal = 0;

      if (!cart || cart.length === 0) {
        list.innerHTML = "<div class='empty'>Your cart is empty 🛒</div>";
        return;
      }

      list.innerHTML = cart.map(item => {

        subtotal += item.price * item.qty;

        return `
    <div class="cart-item">

      <div class="cart-left">
        <div>${item.emoji}</div>
        <div>
          <strong>${item.name}</strong>
          <p>₹${item.price}</p>

          <div class="qty">
            <button onclick="changeQty(${item.id},-1)">−</button>
            ${item.qty}
            <button onclick="changeQty(${item.id},1)">+</button>
          </div>

          <div class="remove" onclick="removeItem(${item.id})">Remove</div>
        </div>
      </div>

      <div>₹${item.price * item.qty}</div>

    </div>
    `;
      }).join("");

      let discount = Math.floor(subtotal * 0.1);
      let delivery = subtotal > 500 ? 0 : 50;
      let total = subtotal - discount + delivery;

      document.getElementById("subtotal").innerText = subtotal;
      document.getElementById("discount").innerText = discount;
      document.getElementById("delivery").innerText = delivery;
      document.getElementById("total").innerText = total;
    }

    function changeQty(id, delta) {
      let item = cart.find(i => i.id === id);
      item.qty += delta;

      if (item.qty <= 0) {
        cart = cart.filter(i => i.id !== id);
      }

      saveCart();
      renderCart();
    }

    function removeItem(id) {
      cart = cart.filter(i => i.id !== id);
      saveCart();
      renderCart();
    }

    function checkout() {
      alert("Order placed successfully 🎉");
      cart = [];
      saveCart();
      renderCart();
    }

    renderCart();

  </script>

</body>

</html>
